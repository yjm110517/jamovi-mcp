name: Build standalone executables

on:
  push:
    tags: ["v*"]
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            name: windows
            artifact: jamovi-mcp.exe
          - os: ubuntu-latest
            name: linux
            artifact: jamovi-mcp
          - os: macos-latest
            name: macos
            artifact: jamovi-mcp

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install build dependencies
        run: pip install pyinstaller .
        shell: bash

      - name: Build executable
        run: |
          pyinstaller --onefile \
            --name "${{ matrix.artifact }}" \
            --add-data "src/jamovi_mcp/proto:jamovi_mcp/proto" \
            --hidden-import jamovi_mcp \
            --hidden-import jamovi_mcp.server \
            --hidden-import jamovi_mcp.config \
            --hidden-import jamovi_mcp.engine \
            --hidden-import jamovi_mcp.connection \
            --hidden-import jamovi_mcp.analyses \
            --hidden-import jamovi_mcp.tools \
            --hidden-import jamovi_mcp.tools.files \
            --hidden-import jamovi_mcp.tools.data \
            --hidden-import jamovi_mcp.tools.analysis \
            src/jamovi_mcp/__main__.py
        shell: bash

      - uses: actions/upload-artifact@v4
        with:
          name: jamovi-mcp-${{ matrix.name }}
          path: dist/

  release:
    name: Create Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: jamovi-mcp-*
          path: release/
          merge-multiple: true

      - name: Prepare release assets
        run: |
          ls -la release/
          cd release
          # Rename artifacts to include platform names
          for f in *; do
            if echo "$f" | grep -q ".exe"; then
              mv "$f" "jamovi-mcp-windows.exe"
            elif file "$f" | grep -q "Mach-O"; then
              mv "$f" "jamovi-mcp-macos"
            elif file "$f" | grep -q "ELF"; then
              mv "$f" "jamovi-mcp-linux"
            fi
          done
        shell: bash

      - uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
