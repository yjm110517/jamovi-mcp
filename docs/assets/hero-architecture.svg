<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="620" viewBox="0 0 1200 620" role="img" aria-labelledby="title desc">
  <title id="title">jamovi MCP architecture overview</title>
  <desc id="desc">A bilingual Chinese and English overview showing MCP clients connecting to jamovi MCP, then to a local jamovi engine, datasets, and analysis results.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#eef6f7"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#0f172a" flood-opacity="0.10"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2563eb"/>
    </marker>
    <style>
      .bg { fill: url(#bg); }
      .card { fill: #ffffff; stroke: #d7e3e8; stroke-width: 1.5; rx: 8; filter: url(#shadow); }
      .small-card { fill: #ffffff; stroke: #d7e3e8; stroke-width: 1.2; rx: 8; }
      .title { font: 700 36px "Microsoft YaHei", "Noto Sans CJK SC", Arial, sans-serif; fill: #0f172a; }
      .subtitle { font: 400 17px "Microsoft YaHei", "Noto Sans CJK SC", Arial, sans-serif; fill: #475569; }
      .label { font: 700 23px "Microsoft YaHei", "Noto Sans CJK SC", Arial, sans-serif; fill: #0f172a; }
      .en { font: 500 13px Arial, sans-serif; fill: #64748b; }
      .body { font: 500 15px "Microsoft YaHei", "Noto Sans CJK SC", Arial, sans-serif; fill: #334155; }
      .tag { font: 700 13px "Microsoft YaHei", "Noto Sans CJK SC", Arial, sans-serif; fill: #0f766e; }
      .line { stroke: #2563eb; stroke-width: 3; fill: none; marker-end: url(#arrow); }
      .local { fill: #ecfeff; stroke: #67e8f9; stroke-width: 1.2; rx: 8; }
      .accent-blue { fill: #2563eb; }
      .accent-teal { fill: #0f766e; }
      .accent-orange { fill: #f97316; }
      .muted { fill: #e2e8f0; }
      .grid { stroke: #e2e8f0; stroke-width: 1; }
    </style>
  </defs>

  <rect class="bg" width="1200" height="620"/>

  <text class="title" x="60" y="72">让 AI 客户端直接调用 jamovi</text>
  <text class="subtitle" x="60" y="105">在 Claude、Cursor 等 MCP 客户端中，通过本地 jamovi engine 打开数据、运行统计分析并保存 OMV 文件。</text>

  <g transform="translate(70 170)">
    <rect class="card" width="245" height="215"/>
    <circle class="accent-blue" cx="56" cy="56" r="24"/>
    <path d="M49 56h14M56 49v14" stroke="#fff" stroke-width="4" stroke-linecap="round"/>
    <text class="label" x="32" y="105">MCP 客户端</text>
    <text class="en" x="32" y="129">Claude / Cursor / 其他客户端</text>
    <rect class="small-card" x="30" y="154" width="185" height="34"/>
    <text class="body" x="47" y="176">自然语言发起分析</text>
  </g>

  <g transform="translate(480 150)">
    <rect class="card" width="265" height="255"/>
    <rect x="34" y="30" width="58" height="58" rx="8" fill="#e0f2fe" stroke="#7dd3fc"/>
    <path d="M50 50h26M50 66h26" stroke="#2563eb" stroke-width="4" stroke-linecap="round"/>
    <text class="label" x="34" y="123">jamovi MCP</text>
    <text class="en" x="34" y="147">Python MCP 服务器</text>
    <text class="body" x="34" y="184">10 个工具统一调度</text>
    <text class="body" x="34" y="212">HTTP open/save</text>
    <text class="body" x="34" y="240">WebSocket + protobuf</text>
  </g>

  <g transform="translate(890 170)">
    <rect class="card" width="245" height="215"/>
    <circle class="accent-teal" cx="56" cy="56" r="24"/>
    <path d="M45 62c12-20 25-20 38 0" stroke="#fff" stroke-width="4" fill="none" stroke-linecap="round"/>
    <text class="label" x="32" y="105">本地 jamovi</text>
    <text class="en" x="32" y="129">本地 jamovi engine</text>
    <rect class="small-card" x="30" y="154" width="185" height="34"/>
    <text class="body" x="47" y="176">数据留在本机</text>
  </g>

  <path class="line" d="M325 278 C370 278 420 278 470 278"/>
  <path class="line" d="M755 278 C800 278 845 278 880 278"/>

  <g transform="translate(150 450)">
    <rect class="local" width="900" height="100"/>
    <text class="tag" x="28" y="32">仅本地运行 · 127.0.0.1</text>
    <text class="body" x="28" y="62">本地文件路径由用户提供，jamovi engine 在本机启动，MCP 通过本地端口通信。</text>
    <text class="en" x="28" y="84">适合科研、教学、数据分析和本地 AI 统计工作流。</text>
  </g>

  <g transform="translate(805 430)">
    <rect class="small-card" width="210" height="130"/>
    <text class="body" x="18" y="30">数据集 Dataset</text>
    <line class="grid" x1="18" y1="48" x2="190" y2="48"/>
    <line class="grid" x1="18" y1="75" x2="190" y2="75"/>
    <line class="grid" x1="18" y1="102" x2="190" y2="102"/>
    <line class="grid" x1="78" y1="48" x2="78" y2="116"/>
    <line class="grid" x1="134" y1="48" x2="134" y2="116"/>
    <circle class="accent-orange" cx="176" cy="30" r="8"/>
  </g>

  <g transform="translate(185 430)">
    <rect class="small-card" width="210" height="130"/>
    <text class="body" x="18" y="30">分析结果 Results</text>
    <rect x="28" y="78" width="24" height="32" fill="#93c5fd"/>
    <rect x="68" y="60" width="24" height="50" fill="#5eead4"/>
    <rect x="108" y="44" width="24" height="66" fill="#fdba74"/>
    <path d="M28 112h132" stroke="#94a3b8" stroke-width="2"/>
    <path d="M30 92c35-38 70-10 115-42" stroke="#2563eb" stroke-width="3" fill="none"/>
  </g>
</svg>
